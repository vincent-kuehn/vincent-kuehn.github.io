<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vincent Kuehn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #1a1a1a;
      background: #faf9f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      max-width: 36rem;
      width: 100%;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .tagline {
      color: #555;
      margin: 0 0 2rem;
      font-size: 1rem;
    }
    p {
      margin: 0 0 1rem;
    }
    a {
      color: #2563eb;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    nav {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e3e0;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    nav a { font-weight: 500; }
  </style>
</head>
<body>
  <main>
    <h1>Vincent Kuehn</h1>
    <p class="tagline">Personal site</p>
    <p>Welcome. This is my personal website—more content coming soon.</p>
    <nav>
      <ul>
        <li><a href="https://github.com/vincent-kuehn">GitHub</a></li>
      </ul>
    </nav>
  </main>
</body>
</html>
